<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calendar | Islamic Center of Morrisville</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="./public/images/icm-logo-provided-transparent.png"><link rel="stylesheet" href="./styles.css?v=20260706-intersection-cleanup-v40">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="Islamic Center of Morrisville home"><img src="./public/images/icm-logo-provided-transparent.png" alt="Islamic Center of Morrisville"></a>
      <nav class="top-nav" aria-label="Primary navigation">
        <a class="nav-donate" href="./donate.html"><img src="./public/icons/generated/donate.png" alt="" aria-hidden="true"><span>Donate</span></a>
        <a href="./calendar.html">Calendar</a>
        <a href="./programs.html">Programs</a>
        <a href="./news.html">News</a>
        <a href="./about.html">About</a>
        <button class="menu-button" type="button" aria-label="Open menu"><img src="./public/icons/generated/menu.png" alt="" aria-hidden="true"></button>
      </nav>
    </header>

    <main class="page-main">
      <section class="page-band calendar-band" id="events">
        <div class="calendar-toolbar">
          <div>
            <h2 data-calendar-title>June 2026</h2>
            <p class="calendar-hijri-date" data-calendar-hijri>Muharram, 1448 Hijri</p>
          </div>
          <div class="calendar-controls" aria-label="Calendar navigation">
            <button type="button" data-calendar-nav="prev" aria-label="Previous month">
              <img src="./public/icons/chevron-left.svg" alt="" aria-hidden="true">
            </button>
            <button type="button" data-calendar-nav="next" aria-label="Next month">
              <img src="./public/icons/chevron-right.svg" alt="" aria-hidden="true">
            </button>
          </div>
        </div>
        <div class="calendar-grid" data-calendar-grid aria-label="Event calendar"></div>
        <aside class="calendar-detail" data-calendar-detail aria-live="polite"></aside>
      </section>
    </main>

    <footer class="site-footer">
      <div class="socials" aria-label="Social links">
        <a href="https://www.facebook.com/ICMMASJID/" target="_blank" rel="noopener" aria-label="Facebook"><img src="./public/icons/generated/facebook.png" alt="" aria-hidden="true"></a>
        <a href="https://www.instagram.com/icmmasjid/" target="_blank" rel="noopener" aria-label="Instagram"><img src="./public/icons/generated/instagram.png" alt="" aria-hidden="true"></a>
        <a href="https://www.youtube.com/@islamiccenterofmorrisville1071" target="_blank" rel="noopener" aria-label="YouTube"><img src="./public/icons/generated/youtube.png" alt="" aria-hidden="true"></a>
      </div>
      <p>&copy; 2026 Islamic Center of Morrisville. All rights reserved.</p>
      <a href="./about.html#contact">Contact Us</a>
    </footer>
    <script type="module" src="./public/app/pages.js?v=20260706-intersection-cleanup-v40"></script>
  </body>
</html>
