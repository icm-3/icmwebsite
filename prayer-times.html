<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Prayer Times | Islamic Center of Morrisville</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="./public/images/icm-logo-provided-transparent.png"><link rel="stylesheet" href="./styles.css?v=20260706-calendar-frame-v39">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="Islamic Center of Morrisville home"><img src="./public/images/icm-logo-provided-transparent.png" alt="Islamic Center of Morrisville"></a>
      <nav class="top-nav" aria-label="Primary navigation">
        <a class="nav-donate" href="./donate.html"><img src="./public/icons/generated/donate.png" alt="" aria-hidden="true"><span>Donate</span></a>
        <a href="./calendar.html">Calendar</a>
        <a href="./programs.html">Programs</a>
        <a href="./news.html">News</a>
        <a href="./about.html">About</a>
        <button class="menu-button" type="button" aria-label="Open menu"><img src="./public/icons/generated/menu.png" alt="" aria-hidden="true"></button>
      </nav>
    </header>

    <main class="page-main">
      <section class="page-band prayer-times-band" id="monthly">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Monthly schedule</p>
            <h2 data-prayer-month-title>Monthly Times</h2>
          </div>
          <div class="prayer-month-controls prayer-date-controls" aria-label="Prayer schedule navigation">
            <select data-prayer-month aria-label="Select prayer schedule month">
              <option value="">Select month</option>
              <option value="1">January</option>
              <option value="2">February</option>
              <option value="3">March</option>
              <option value="4">April</option>
              <option value="5">May</option>
              <option value="6">June</option>
              <option value="7">July</option>
              <option value="8">August</option>
              <option value="9">September</option>
              <option value="10">October</option>
              <option value="11">November</option>
              <option value="12">December</option>
              <option value="13">Ramadan</option>
            </select>
            <select class="prayer-day-select" data-prayer-day aria-label="Select prayer schedule day">
              <option value="">Select day</option>
            </select>
            <button class="prayer-month-today" type="button" data-prayer-month-today>Today</button>
          </div>
        </div>
        <div class="prayer-table-shell">
          <div class="prayer-table-status" data-prayer-status>Loading prayer times...</div>
          <div class="prayer-table-scroll" data-prayer-table></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="socials" aria-label="Social links">
        <a href="https://www.facebook.com/ICMMASJID/" target="_blank" rel="noopener" aria-label="Facebook"><img src="./public/icons/generated/facebook.png" alt="" aria-hidden="true"></a>
        <a href="https://www.instagram.com/icmmasjid/" target="_blank" rel="noopener" aria-label="Instagram"><img src="./public/icons/generated/instagram.png" alt="" aria-hidden="true"></a>
        <a href="https://www.youtube.com/@islamiccenterofmorrisville1071" target="_blank" rel="noopener" aria-label="YouTube"><img src="./public/icons/generated/youtube.png" alt="" aria-hidden="true"></a>
      </div>
      <p>&copy; 2026 Islamic Center of Morrisville. All rights reserved.</p>
      <a href="./about.html#contact">Contact Us</a>
    </footer>
    <script type="module" src="./public/app/site.js?v=20260706-calendar-frame-v39"></script>
  </body>
</html>
